<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DXOFFICIALS EMPIRE - Vee CBT Prep</title>
  <style>
    * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    body { background-color: #0f172a; color: #f8fafc; margin: 0; padding: 15px; }
    .header { text-align: center; padding: 10px 0; border-bottom: 2px solid #334155; }
    .header h1 { color: #f59e0b; margin: 0; font-size: 24px; }
    .header p { color: #94a3b8; margin: 5px 0 0; font-size: 14px; }
    .score-board { text-align: right; color: #38bdf8; font-weight: bold; margin-top: 10px; font-size: 14px; }
    .card { background: #1e293b; border-radius: 12px; padding: 20px; margin-top: 10px; border: 1px solid #334155; }
    .subject-tag { color: #f59e0b; font-weight: bold; font-size: 14px; text-transform: uppercase; margin-bottom: 8px; }
    .question-title { font-size: 18px; color: #e2e8f0; margin-bottom: 15px; line-height: 1.4; }
    .options { display: flex; flex-direction: column; gap: 10px; }
    .option-btn { background: #334155; color: #fff; border: 1px solid #475569; padding: 12px; border-radius: 8px; font-size: 16px; text-align: left; cursor: pointer; transition: 0.2s; }
    .option-btn.correct { background: #16a34a !important; border-color: #22c55e !important; }
    .option-btn.wrong { background: #dc2626 !important; border-color: #ef4444 !important; }
    
    .action-row { display: flex; gap: 10px; margin-top: 20px; }
    .ask-vee-btn { background: #f59e0b; color: #0f172a; border: none; padding: 14px; border-radius: 8px; font-size: 15px; font-weight: bold; cursor: pointer; flex: 1; }
    .next-btn { background: #3b82f6; color: #fff; border: none; padding: 14px; border-radius: 8px; font-size: 15px; font-weight: bold; cursor: pointer; }
    
    .vee-panel { display: none; background: #0284c7; border-radius: 12px; padding: 15px; margin-top: 15px; color: #fff; }
    .vee-header { font-weight: bold; font-size: 18px; margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
    .tabs { display: flex; gap: 5px; margin-bottom: 10px; }
    .tab-btn { background: #0369a1; color: #fff; border: none; padding: 8px 12px; border-radius: 5px; font-size: 12px; font-weight: bold; cursor: pointer; flex: 1; }
    .tab-btn.active { background: #f59e0b; color: #0f172a; }
    .explanation-text { background: rgba(0,0,0,0.2); padding: 12px; border-radius: 6px; font-size: 14px; line-height: 1.5; }
    .wrong-breakdown { margin-top: 12px; background: rgba(0,0,0,0.3); padding: 12px; border-radius: 6px; font-size: 13px; line-height: 1.5; border-left: 4px solid #f59e0b; }
  </style>
</head>
<body>

  <div class="header">
    <h1>DXOFFICIALS EMPIRE</h1>
    <p>Powered by Vee - AI Study Assistant</p>
  </div>

  <div class="score-board" id="scoreBoard">Score: 0 / 0</div>

  <div class="card">
    <div class="subject-tag" id="subjectTag">JAMB Prep</div>
    <div class="question-title" id="questionText">Loading question...</div>
    <div class="options" id="optionsContainer"></div>

    <div class="action-row">
      <button class="ask-vee-btn" onclick="toggleVee()">🤖 Ask Vee for Explanation</button>
      <button class="next-btn" onclick="nextQuestion()">Next ➡️</button>
    </div>

    <div class="vee-panel" id="veePanel">
      <div class="vee-header">💡 Vee's Simplified Solution</div>
      <div class="tabs">
        <button class="tab-btn active" id="tab1" onclick="showMethod(1)">1. Speed Elimination</button>
        <button class="tab-btn" id="tab2" onclick="showMethod(2)">2. Plain English</button>
        <button class="tab-btn" id="tab3" onclick="showMethod(3)">3. Standard Concept</button>
      </div>
      <div class="explanation-text" id="methodText"></div>
      <div class="wrong-breakdown" id="wrongBreakdownText"></div>
    </div>
  </div>

  <script>
    const questions = [
      {
        subject: "JAMB Chemistry",
        question: "Which of the following gases turns lime water milky?",
        options: ["A) Oxygen", "B) Carbon (IV) Oxide", "C) Hydrogen", "D) Ammonia"],
        answerIndex: 1,
        m1: "<b>⚡ Speed Elimination Trick:</b> Lime water is acidic/neutral, so it tests for acidic gases. Oxygen and Hydrogen are neutral gases, while Ammonia is alkaline. That leaves Carbon (IV) Oxide as the only acidic oxide here!",
        m2: "<b>Plain-English Logic:</b> Lime water contains dissolved calcium. When Carbon (IV) Oxide gas passes through it, it reacts to form insoluble chalk powder (limestone), making the water look white like milk.",
        m3: "<b>Standard Reaction Formula:</b><br>Ca(OH)₂ (aq) + CO₂ (g) → CaCO₃ (s) + H₂O (l)<br><i>CaCO₃ is the white solid precipitate that creates the milky appearance.</i>",
        wrongBreakdown: "<b>❌ Why Other Options Are Wrong:</b><br>• <b>A) Oxygen:</b> Supports burning; relights a glowing wooden splint.<br>• <b>C) Hydrogen:</b> Highly flammable gas; burns with a sharp 'pop' sound.<br>• <b>D) Ammonia:</b> Alkaline gas; turns damp red litmus paper blue and has a sharp smell."
      },
      {
        subject: "JAMB Physics",
        question: "What is the S.I. unit of Force?",
        options: ["A) Joule", "B) Watt", "C) Newton", "D) Pascal"],
        answerIndex: 2,
        m1: "<b>⚡ Speed Elimination Trick:</b> Think about physics formulas! F = ma. Since Force causes acceleration of mass, eliminate Joules (energy) and Watts (power). The unit named after Newton represents force directly.",
        m2: "<b>Plain-English Logic:</b> Force is simply a push or a pull. Sir Isaac Newton calculated the laws governing pushes and pulls, so the international unit of force was named in his honor.",
        m3: "<b>Standard Formula:</b><br>Force = Mass × Acceleration (F = ma)<br>Mass (kg) × Acceleration (m/s²) = <b>1 Newton (N)</b>.",
        wrongBreakdown: "<b>❌ Why Other Options Are Wrong:</b><br>• <b>A) Joule:</b> S.I. unit for Energy and Work done.<br>• <b>B) Watt:</b> S.I. unit for Power (Work ÷ Time).<br>• <b>D) Pascal:</b> S.I. unit for Pressure (Force ÷ Area)."
      }
    ];

    let currentIndex = 0;
    let selectedOptionIndex = null;
    let score = 0;
    let totalAnswered = 0;

    function loadQuestion() {
      const q = questions[currentIndex];
      document.getElementById('subjectTag').innerText = q.subject;
      document.getElementById('questionText').innerText = q.question;
      
      const container = document.getElementById('optionsContainer');
      container.innerHTML = '';
      selectedOptionIndex = null;
      document.getElementById('veePanel').style.display = 'none';

      q.options.forEach((optText, index) => {
        const btn = document.createElement('button');
        btn.className = 'option-btn';
        btn.innerText = optText;
        btn.onclick = () => checkAnswer(index, btn);
        container.appendChild(btn);
      });

      showMethod(1);
    }

    function checkAnswer(chosenIndex, btnElement) {
      if (selectedOptionIndex !== null) return;
      selectedOptionIndex = chosenIndex;
      totalAnswered++;
      
      const q = questions[currentIndex];
      const allBtns = document.querySelectorAll('.option-btn');

      if (chosenIndex === q.answerIndex) {
        btnElement.classList.add('correct');
        score++;
      } else {
        btnElement.classList.add('wrong');
        allBtns[q.answerIndex].classList.add('correct');
      }

      document.getElementById('scoreBoard').innerText = `Score: ${score} / ${totalAnswered}`;
      document.getElementById('veePanel').style.display = 'block';
    }

    function nextQuestion() {
      currentIndex = (currentIndex + 1) % questions.length;
      loadQuestion();
    }

    function toggleVee() {
      var panel = document.getElementById('veePanel');
      panel.style.display = panel.style.display === 'block' ? 'none' : 'block';
    }

    function showMethod(num) {
      const q = questions[currentIndex];
      const text = document.getElementById('methodText');
      
      document.getElementById('tab1').classList.remove('active');
      document.getElementById('tab2').classList.remove('active');
      document.getElementById('tab3').classList.remove('active');

      document.getElementById('tab' + num).classList.add('active');

      if (num === 1) text.innerHTML = q.m1;
      if (num === 2) text.innerHTML = q.m2;
      if (num === 3) text.innerHTML = q.m3;

      document.getElementById('wrongBreakdownText').innerHTML = q.wrongBreakdown;
    }

    loadQuestion();
  </script>

</body>
</html>
